<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Termux YouTube Live Generator</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:30px;
    text-align:center;
}
.container{
    max-width:700px;
    margin:auto;
}
input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
}
button{
    padding:8px 16px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
textarea{
    width:100%;
    height:70px;
    margin-top:10px;
    border-radius:8px;
    padding:10px;
    font-family: monospace;
}
.box{
    background:#1e293b;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    text-align:left;
}
.copy{margin-left:10px;}
#steps{display:none;}
</style>
</head>
<body>
<div class="container">

<h2>🔥 Termux YouTube Live Generator ❤️</h2>

<input id="video" placeholder="Video Name (example: tarikulytvideo1.mp4)">
<input id="key" placeholder="Stream Key">
<br>
<button onclick="generate()">Generate Commands</button>

<div id="steps">

<div class="box">
<h3>Step 1: Update & Install Packages</h3>
<textarea id="cmd1" readonly>pkg update && pkg upgrade -y</textarea>
<button class="copy" onclick="copy('cmd1')">Copy</button>

<textarea id="cmd2" readonly>pkg install ffmpeg</textarea>
<button class="copy" onclick="copy('cmd2')">Copy</button>

<textarea id="cmd3" readonly>termux-setup-storage</textarea>
<button class="copy" onclick="copy('cmd3')">Copy</button>
</div>

<div class="box">
<h3>Step 2: Video File Path</h3>
<textarea id="videoPath" readonly></textarea>
<button class="copy" onclick="copy('videoPath')">Copy</button>
</div>

<div class="box">
<h3>Step 3: Check Video File</h3>
<textarea id="checkDownload" readonly>ls /storage/emulated/0/Download/</textarea>
<button class="copy" onclick="copy('checkDownload')">Copy</button>
</div>

<div class="box">
<h3>Step 4: Open YouTube Studio</h3>
<p>Desktop এ YouTube Studio খুলুন, Go Live করুন।</p>
</div>

<div class="box">
<h3>Step 5: Start Live</h3>
<textarea id="liveStart" readonly></textarea>
<button class="copy" onclick="copy('liveStart')">Copy</button>
</div>

<div class="box">
<h3>Step 6: Loop Live</h3>
<textarea id="loopLive" readonly></textarea>
<button class="copy" onclick="copy('loopLive')">Copy</button>
</div>

<div class="box">
<h3>Step 7: Stop Live</h3>
<textarea readonly>Ctrl + C</textarea>
<button class="copy" onclick="copy('stop')">Copy</button>
</div>

</div>
</div>

<script>
function generate(){
    let video=document.getElementById("video").value.trim();
    let key=document.getElementById("key").value.trim();
    if(video=="" || key==""){
        alert("Enter Video Name & Stream Key");
        return;
    }
    let path="/storage/emulated/0/Download/"+video;
    document.getElementById("steps").style.display="block";

    // Step 2: Video Path
    document.getElementById("videoPath").value="Internal Storage > Download > "+video;

    // Start Live
    document.getElementById("liveStart").value="ffmpeg -re -i \""+path+"\" -c copy -f flv rtmp://a.rtmp.youtube.com/live2/"+key;

    // Loop Live
    document.getElementById("loopLive").value="while true; do ffmpeg -re -i \""+path+"\" -c copy -f flv rtmp://a.rtmp.youtube.com/live2/"+key+"; done";
}

function copy(id){
    let text=document.getElementById(id);
    text.select();
    text.setSelectionRange(0,99999);
    document.execCommand("copy");
    alert("Copied!");
}
</script>
</body>
</html>
