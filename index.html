<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Termux YouTube Live Generator</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:30px;
    text-align:center;
}
.container{
    max-width:900px;
    margin:auto;
}
input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
}
button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    cursor:pointer;
}
textarea{
    width:100%;
    height:70px;
    margin-top:10px;
    border-radius:8px;
    padding:10px;
    font-family: monospace;
}
.box{
    background:#1e293b;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    text-align:left;
}
.copy{
    background:#22c55e;
    margin-left:10px;
}
#steps{display:none;}
</style>
</head>
<body>
<div class="container">
<h2>📺 Termux YouTube Live Step Guide</h2>

<input id="video" placeholder="Video Name (example: Tarikulyt90.mp4)">
<input id="key" placeholder="Stream Key">
<br>
<button onclick="generate()">Generate Commands</button>

<div id="steps">

<!-- Step 1 -->
<div class="box">
<h3>🔴 Step 1: Install Packages</h3>
<textarea id="cmd1" readonly>pkg update && pkg upgrade -y</textarea>
<button class="copy" onclick="copy('cmd1')">Copy</button>

<textarea id="cmd2" readonly>pkg install ffmpeg</textarea>
<button class="copy" onclick="copy('cmd2')">Copy</button>

<textarea id="cmd3" readonly>termux-setup-storage</textarea>
<button class="copy" onclick="copy('cmd3')">Copy</button>

<p>📌 Press Allow to give storage access</p>
</div>

<!-- Step 2 -->
<div class="box">
<h3>🔴 Step 2: Check Video File</h3>
<p>Check the Download folder:</p>
<textarea id="checkDownload" readonly>ls /storage/emulated/0/Download/</textarea>
<button class="copy" onclick="copy('checkDownload')">Copy</button>
</div>

<!-- Step 3 -->
<div class="box">
<h3>🎥 Step 3: Start Live</h3>
<textarea id="liveStart" readonly></textarea>
<button class="copy" onclick="copy('liveStart')">Copy</button>
</div>

<!-- Step 4 -->
<div class="box">
<h3>🔁 Step 4: Loop Live</h3>
<textarea id="loopLive" readonly></textarea>
<button class="copy" onclick="copy('loopLive')">Copy</button>
<p>💡 This command will repeat the video indefinitely for YouTube Live.</p>
</div>

<!-- Step 5 -->
<div class="box">
<h3>⛔ Step 5: Stop Live</h3>
<textarea readonly>Ctrl + C</textarea>
<button class="copy" onclick="copy('stop')">Copy</button>
</div>

</div>
</div>

<script>
function generate(){
    let video=document.getElementById("video").value;
    let key=document.getElementById("key").value;
    
    let path="/storage/emulated/0/Download/"+video;

    document.getElementById("steps").style.display="block";

    // Step 3: Start Live
    document.getElementById("liveStart").value="ffmpeg -re -i '"+path+"' -c:v libx264 -preset veryfast -b:v 2500k -c:a aac -ar 44100 -b:a 128k -f flv rtmp://a.rtmp.youtube.com/live2/"+key;

    // Step 4: Loop Live
    document.getElementById("loopLive").value="ffmpeg -stream_loop -1 -re -i '"+path+"' -c:v libx264 -preset veryfast -b:v 2500k -c:a aac -ar 44100 -b:a 128k -f flv rtmp://a.rtmp.youtube.com/live2/"+key;
}

// Copy function
function copy(id){
    let text=document.getElementById(id);
    text.select();
    text.setSelectionRange(0,99999);
    document.execCommand("copy");
    alert("Copied!");
}
</script>
</body>
</html>
